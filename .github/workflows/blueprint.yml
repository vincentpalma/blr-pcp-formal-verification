name: Compile blueprint

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build_project:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz libgraphviz-dev pkg-config python3-dev

      - name: Install blueprint dependencies
        run: |
          python -m venv env
          . env/bin/activate
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install leanblueprint

      - name: Build Lean project
        uses: leanprover/lean-action@v1
        with:
          build: true
          lint: false
          mk_all-check: false
          use-github-cache: false

      - name: Generate LeanArchitect blueprint files
        run: ~/.elan/bin/lake build :blueprint

      - name: Build blueprint web
        run: |
          . env/bin/activate
          leanblueprint web